version: "2.0"
status: "final_evidence_sources"

research_problem:
  short_name: "damage_priority_disagreement_audit"
  question: >-
    Where does a damage-only post-disaster ranking disagree with transparent
    multi-source priority scenarios, and which disagreements remain under fixed
    definition, weight, population-resolution, spatial-scale, and temporal checks?
  claim_boundary: >-
    The analysis audits priority disagreement. It does not observe true unmet
    need and does not prescribe operational dispatch.

core_events:
  - name: "hurricane-harvey"
    disaster_type: "flooding"
    xbd_buildings: 23014
    reference_cells_500m: 612
  - name: "mexico-earthquake"
    disaster_type: "earthquake"
    xbd_buildings: 32271
    reference_cells_500m: 288
  - name: "palu-tsunami"
    disaster_type: "tsunami"
    xbd_buildings: 31394
    reference_cells_500m: 196
  - name: "santa-rosa-wildfire"
    disaster_type: "fire"
    xbd_buildings: 12950
    reference_cells_500m: 352

datasets:
  xbd:
    names: ["xView2", "xBD"]
    role: "physical_damage_evidence"
    source_status: "available_in_reference_compute_workspace"
    public_release: "derived labels and grid aggregates only"
    raw_imagery_redistributed: false
    required_fields:
      - "features.lng_lat"
      - "features.xy"
      - "features.lng_lat[].properties.subtype"
      - "metadata.disaster"
      - "metadata.disaster_type"
      - "metadata.capture_date"

  worldpop_100m:
    role: "primary_population_exposure"
    product: "WorldPop R2025A 100m event-year population count"
    countries_years:
      USA: 2017
      MEX: 2017
      IDN: 2018
    status: "complete_all_four_events"
    quality: "1448/1448 reference cells matched; no missing, nonfinite, or negative values"
    raw_rasters_redistributed: false

  worldpop_1km:
    role: "population_resolution_sensitivity"
    product: "WorldPop Global1 1km event-year population count"
    status: "complete_all_four_events"
    raw_rasters_redistributed: false

  osm_current:
    role: "current_road_facility_and_building_context"
    source: "OpenStreetMap via OSMnx/Overpass-compatible retrieval"
    status: "complete_all_four_events"
    derived_features:
      - "road length density"
      - "intersection density"
      - "facility count"
      - "nearest critical facility distance"
      - "building count and footprint area"
    temporal_boundary: "current snapshots may include post-event edits"

  osm_historical:
    role: "pre_event_temporal_sensitivity"
    source: "ohsome API"
    status: "complete_with_coverage_gates"
    derived_features:
      - "pre-event roads"
      - "pre-event critical facilities"
      - "pre-event buildings"
    failure_rule: "request failure or insufficient coverage is not_assessable, never zero"

  cdc_svi_2016:
    role: "pre_event_social_vulnerability_proxy"
    geography: "Census tract"
    event_scope: "Hurricane Harvey footprint"
    status: "complete_149_tracts"
    truth_status: "external proxy, not unmet-need ground truth"

  openfema_nfip_claims_v2:
    role: "insured_property_loss_proxy"
    geography: "Census tract"
    event_scope: "Hurricane Harvey period and study footprint"
    status: "complete_10134_claims_aggregated_to_149_tracts"
    privacy_rule: "individual claim rows are not saved or redistributed"
    truth_status: "external proxy, not unmet-need ground truth"

  openfema_ri_ihp:
    role: "registration_eligibility_and_assistance_proxy"
    geography: "ZIP"
    event_scope: "Hurricane Harvey"
    status: "complete_41_zip_aggregates"
    table_rule: "one RI-IHP table only; owner and renter records are not double-counted"
    truth_status: "external proxy, not unmet-need ground truth"

  census_geographies:
    role: "tract_and_zip_spatial_support"
    source: "US Census TIGER/Line or documented mirror"
    status: "complete_for_external_proxy_joins"

analysis_units:
  reference_grid_m: 500
  robustness_grids_m: [250, 500, 1000]
  grid_rule: "each scale is rebuilt from building-level inputs"

redistribution:
  included:
    - "privacy-safe derived CSV and GeoJSON"
    - "configs, manifests, scripts, figures, reports, and evidence records"
  excluded:
    - "raw xBD satellite imagery and full archive"
    - "raw WorldPop rasters"
    - "bulk OSM extracts and caches"
    - "individual NFIP or FEMA assistance rows"
    - "credentials and private infrastructure details"

non_goals:
  - "No causal claim that urban form causes damage or need."
  - "No assertion that one policy-weight vector is morally correct."
  - "No claim that an external proxy is universal ground truth."
  - "No autonomous emergency allocation recommendation."
