version: "1.0"
status: "final_frozen_scenarios"

principles:
  - "Damage severity is the comparison baseline, not a complete recovery-need label."
  - "Multi-source scores are transparent priority scenarios, not observed ground truth."
  - "No single weight vector is presented as the uniquely correct policy."
  - "Final claims depend on fixed sensitivity and consensus gates."

components:
  damage_norm: "event-wise min-max normalized xBD damage indicator"
  population_norm: "event-wise min-max normalized log1p(WorldPop population)"
  accessibility_need_norm: "event-wise min-max normalized inverse log1p(OSM road density)"
  service_need_norm: >-
    0.5 times normalized nearest-facility distance plus 0.5 times normalized
    inverse log1p(critical-facility count)

active_scenarios:
  - name: "damage_only_baseline"
    public_label: "Damage only"
    role: "baseline"
    weights:
      damage: 1.0

  - name: "balanced_need"
    public_label: "Multi-source: balanced"
    role: "main_scenario"
    weights:
      damage_norm: 0.40
      population_norm: 0.35
      accessibility_need_norm: 0.15
      service_need_norm: 0.10

  - name: "population_sensitive"
    public_label: "Multi-source: population"
    role: "sensitivity_scenario"
    weights:
      damage_norm: 0.25
      population_norm: 0.55
      accessibility_need_norm: 0.10
      service_need_norm: 0.10

  - name: "accessibility_sensitive"
    public_label: "Multi-source: accessibility"
    role: "sensitivity_scenario"
    weights:
      damage_norm: 0.25
      population_norm: 0.30
      accessibility_need_norm: 0.30
      service_need_norm: 0.15

selection:
  top_share: 0.20
  exact_top_k: "ceil(event_cell_count * top_share)"
  scenario_consensus: >-
    A cell enters the provisional disagreement set when it is selected by at
    least two multi-source scenarios and is not selected by the damage-only baseline.

weight_uncertainty:
  seed: 20260715
  unconstrained_draws: 10000
  unconstrained_distribution: "Dirichlet(1,1,1,1)"
  policy_bounded_draws: 10000
  policy_bounds:
    damage: [0.20, 0.50]
    population_min: 0.05
    accessibility_min: 0.05
    service_min: 0.05

compatibility_note: >-
  Earlier internal column names containing 'need' remain unchanged so released
  schemas and hashes stay reproducible. Public text and figure labels use
  'multi-source priority scenario' and 'priority disagreement'.
