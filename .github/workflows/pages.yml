name: Website and Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/verify_website.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start static site
        run: python -m http.server 4173 --directory docs > /tmp/auto-city-site.log 2>&1 &
      - name: Verify desktop and mobile website
        run: npm run test:website
        env:
          WEBSITE_URL: http://127.0.0.1:4173/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: website-qa
          path: .qa/website

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
